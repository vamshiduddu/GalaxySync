name: Build and Test GalaxySync

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: macos-14

    env:
      SCHEME: GalaxySync
      WORKSPACE: GalaxySync.xcworkspace
      DESTINATION: platform=iOS Simulator,name=iPhone 15 Pro,OS=latest
      CONFIGURATION: Debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache derived data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.swift', '**/*.xccodeproj/**') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace ${{ env.WORKSPACE }} \
            -scheme ${{ env.SCHEME }}

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -workspace ${{ env.WORKSPACE }} \
            -scheme ${{ env.SCHEME }} \
            -destination "${{ env.DESTINATION }}" \
            -configuration ${{ env.CONFIGURATION }} \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Run unit tests
        run: |
          xcodebuild test-without-building \
            -workspace ${{ env.WORKSPACE }} \
            -scheme ${{ env.SCHEME }} \
            -destination "${{ env.DESTINATION }}" \
            -configuration ${{ env.CONFIGURATION }} \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-${{ github.run_number }}
          path: TestResults.xcresult
          retention-days: 14

  archive:
    name: Archive & Export (Release)
    runs-on: macos-14
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo $CERTIFICATE_BASE64 | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Import provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/GalaxySync.mobileprovision
          echo $PROVISIONING_PROFILE_BASE64 | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace GalaxySync.xcworkspace \
            -scheme GalaxySync \
            -configuration Release \
            -archivePath $RUNNER_TEMP/GalaxySync.xcarchive \
            CODE_SIGN_STYLE=Manual \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/GalaxySync.xcarchive \
            -exportPath $RUNNER_TEMP/GalaxySync-Export \
            -exportOptionsPlist ExportOptions.plist \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalaxySync-${{ github.run_number }}.ipa
          path: ${{ runner.temp }}/GalaxySync-Export/*.ipa
          retention-days: 30
